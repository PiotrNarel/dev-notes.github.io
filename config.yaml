baseURL : 'dev-notes.pl'
languageCode : 'pl-PL'
title : 'dev-notes.pl | Piotr Narel'
theme : 'PaperMod'
publishDir : 'docs'
relativeURLs : true
paginate: 5

enableRobotsTXT : true
buildDrafts : false
buildFuture: false
buildExpired: false

#googleAnalytics: UA-123-45

minify:
    disableXML: true
    minifyOutput: true

outputs:
    home:
        - HTML
        - RSS
        - JSON

params:
    env: production # to enable google analytics, opengraph, twitter-cards and schema.
    title: dev-notes.pl
    description: "dev-notes.pl Notatnik programisty - Piotr Narel"
    keywords: [Blog, Java, Programowanie, Technologie, DevOps, Dev Portfolio, PaperMod]
    author: Me
    # author: ["Me", "You"] # multiple authors
    images: ["<link or path of image for opengraph, twitter-cards>"]
    DateFormat: "January 2, 2006"
    defaultTheme: auto # dark, light
    disableThemeToggle: false

    ShowReadingTime: true
    ShowShareButtons: true
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: false
    disableSpecial1stPost: false
    disableScrollToTop: false
    comments: true
    hidemeta: false
    hideSummary: false
    showtoc: false
    tocopen: false

    assets:
        # disableHLJS: true # to disable highlight.js
        # disableFingerprinting: true
#        favicon: "<link / abs url>"
#        favicon16x16: "<link / abs url>"
#        favicon32x32: "<link / abs url>"
#        apple_touch_icon: "<link / abs url>"
#        safari_pinned_tab: "<link / abs url>"

#    label:
#        text: "Home"
#        icon: /apple-touch-icon.png
#        iconHeight: 35

    # profile-mode
    profileMode:
        enabled: false # needs to be explicitly set
        title: dev-notes.pl | Piotr Narel
        subtitle: "Notatnik programisty - z przymrużeniem oka ;)"
        # imageUrl: "<img location>"
        imageWidth: 120
        imageHeight: 120
        # imageTitle: my image
        buttons:
            - name: Blog
              url: posts
            - name: Kategorie
              url: categories
            - name: Tagi
              url: tags
            - name: Archiwum
              url: archives

    # home-info mode
    homeInfoParams:
        Title: "Cześć!"
        Content: Nazywam się Piotrek, jestem programistą a niniejszy blog ma na celu uporządkowanie wiedzy, podzielenie się przemyśleniami oraz doświadczeniami związanymi z szeroko rozumianą technologią. Zapraszam do lektury jak i również do kontaktu poprzez media społecznościowe - linki poniżej. Miłego czytania!


    socialIcons:
        - name: linkedin
          url: "https://www.linkedin.com/in/piotr-narel/"
        - name: github
          url: "https://github.com/PiotrNarel"
        - name: rss
          url: "https://dev-notes.pl/index.xml"
    analytics:
        google:
            SiteVerificationTag: "XYZabc"
        bing:
            SiteVerificationTag: "XYZabc"
        yandex:
            SiteVerificationTag: "XYZabc"

    cover:
        hidden: true # hide everywhere but not in structured data
        hiddenInList: true # hide on list pages and home
        hiddenInSingle: true # hide on single page

    # editPost:
    #     URL: "https://github.com/<path_to_repo>/content"
    #     Text: "Suggest Changes" # edit text
    #     appendFilePath: true # to append file path to Edit link

    # for search
    # https://fusejs.io/api/options.html
    fuseOpts:
        isCaseSensitive: false
        shouldSort: true
        location: 0
        distance: 1000
        threshold: 0.4
        minMatchCharLength: 0
        keys: ["title", "permalink", "summary", "content"]
menu:
    main:
        - identifier: toolbox
          name: Narzędziówka
          url: /toolbox/
          weight: 5
        - identifier: categories
          name: Kategorie
          url: /categories/
          weight: 10
        - identifier: tags
          name: Tagi
          url: /tags/
          weight: 20
        - identifier: archives
          name: Archiwum
          url: /archives
          weight: 30
        - identifier: links
          name: Linki
          url: /links
          weight: 40
        - identifier: search
          name: Szukaj
          url: /search
          weight: 50
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
# pygmentsUseClasses: true
markup:
    highlight:
        anchorLineNos: true
        codeFences: true
        guessSyntax: true
        lineNos: false
        style: monokai
